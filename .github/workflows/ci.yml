name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24.x", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Coverage Gate (>=85%)
        run: ./scripts/check_coverage.sh 85.0
      - name: Race (linux/amd64)
        run: go test -race ./...
      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
      - name: Go Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Build binaries
        run: |
          mkdir -p dist
          export CGO_ENABLED=0
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          suffix=""
          if [ "$GOOS" = "windows" ]; then suffix=".exe"; fi
          go build -o "dist/goddgs-${GOOS}-${GOARCH}${suffix}" ./cmd/goddgs
          go build -o "dist/goddgsd-${GOOS}-${GOARCH}${suffix}" ./cmd/goddgsd
